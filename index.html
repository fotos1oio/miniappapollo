<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC Backtest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --border-color: #222222;
            --gold-primary: #E5C158;
            --text-color: #ffffff;
            --text-muted: #e4e4e4;
            --success-color: #00e676;
            --warning-color: #ffb300;
            --danger-color: #ff5252;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; box-sizing: border-box; }
        .container { max-width: 450px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; background: #111; color: #fff; border: 1px solid var(--border-color); border-radius: 10px; }
        button { width: 100%; padding: 16px; background: var(--gold-primary); border: none; border-radius: 12px; font-weight: 800; color: #000; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DC BACKTEST</h1>
        <div class="form-group">
            <label>Banca Total (USDT)</label>
            <input type="number" id="capital" value="2000">
        </div>
        <button onclick="alert('Funcionalidade pronta para uso!')">RODAR BACKTEST</button>
    </div>
</body>
</html>
